<!DOCTYPE html>
<html>
<head>
    <title> SkyFly Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
            rgba(0,0,0,0.4),
            rgba(0,0,0,0.4)
            ),

            url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=2074');

            background-size:cover;
            background-position:center;
        }

        .glass-card{

            width:400px;

            padding:40px;

            border-radius:20px;

            backdrop-filter:blur(12px);

            background:rgba(255,255,255,0.15);

            border:1px solid rgba(255,255,255,0.3);

            box-shadow:0 8px 32px rgba(0,0,0,0.3);

            color:white;
        }

        .glass-card h2{
            text-align:center;
            margin-bottom:25px;
            font-weight:bold;
        }

        .form-control{
            background:rgba(255,255,255,0.2);
            color:white;
            border:none;
        }

        .form-control::placeholder{
            color:white;
        }

        .form-control:focus{
            background:rgba(255,255,255,0.25);
            color:white;
        }

        .btn-login{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            font-weight:bold;
        }

        .signup-link{
            text-align:center;
            margin-top:15px;
        }

        .signup-link a{
            color:white;
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="glass-card">

    <h2>✈ SkyFly Login</h2>

    {% if error %}

     <div class="alert alert-danger text-center">
        
        ❌ {{ error }}

     </div>

    {% endif %}

    <form method="POST">

        <input
        type="text"
        name="username"
        class="form-control mb-3"
        placeholder="Username"
        required>

        <input
        type="password"
        name="password"
        class="form-control mb-3"
        placeholder="Password"
        required>

        <div class="d-flex justify-content-between mb-3">
            <div>
                <input type="checkbox">
                Remember Me
            </div>
            
            <a href="#" class="text-white">
                Forgot Password?

            </a>

        </div>

        <button
        class="btn btn-primary btn-login">

            Login

        </button>
    </form>

    <div class="signup-link">

        New User?

        <a href="/signup">
            Create Account
        </a>

    </div>

</div>

</body>
</html>
